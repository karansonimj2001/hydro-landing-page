<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Hydro</title>
    <link rel="stylesheet" href="/src/style.css">
    <style>
        .content-page {
            padding-top: 10rem;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .content-page h1 {
            font-size: 3.5rem;
            margin-bottom: 2rem;
        }

        .contact-form {
            background: var(--surface-card);
            padding: 4rem;
            border-radius: 32px;
            border: 1px solid var(--glass-border);
            text-align: left;
            margin-top: 3rem;
        }

        .form-group {
            margin-bottom: 2rem;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            background: var(--bg-dark);
            border: 1px solid var(--glass-border);
            padding: 1rem;
            border-radius: 12px;
            color: white;
            font-family: inherit;
            transition: var(--transition-fast);
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 2rem;
            transition: var(--transition-fast);
        }

        .back-link:hover {
            transform: translateX(-5px);
        }
    </style>
</head>

<body>
    <div class="bg-glow"></div>
    <nav id="navbar" class="scrolled">
        <div class="nav-container">
            <a href="/" class="logo">Hydro</a>
            <div class="nav-cta">
                <a href="/" class="btn btn-secondary btn-sm">Back to Home</a>
            </div>
        </div>
    </nav>

    <main class="content-page">
        <a href="/" class="back-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="m15 18-6-6 6-6" />
            </svg>
            Back
        </a>
        <h1 class="text-gradient">Get in Touch</h1>
        <p>Have a feature idea? Found a bug? Just want to say hi? <br>Reach out directly. No robots, just me.</p>

        <div class="contact-form glass-card reveal">
            <form id="contactForm" action="https://api.web3forms.com/submit" method="POST">
                <!-- Replace with your real access key -->
                <input type="hidden" name="access_key" value="9ba96c61-7f9b-43da-8024-f08be5060b0d">
                <input type="hidden" name="subject" value="New Hydro Query">
                <input type="checkbox" name="botcheck" style="display: none;">

                <div class="form-group">
                    <label>Name</label>
                    <input type="text" name="name" placeholder="Your name" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="hello@example.com" required>
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea name="message" rows="5" placeholder="What's on your mind?" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-xl" style="width: 100%;">Send Message</button>
            </form>
            <div id="formResult" style="display: none; margin-top: 1.5rem; text-align: center; font-weight: 600;"></div>
        </div>

        <p style="margin-top: 4rem; color: var(--text-dim);">Alternatively, shoot me an email at
            <br><strong>build@hydrationhelper.app</strong>
        </p>
    </main>

    <footer style="margin-top: 5rem;">
        <div class="footer-bottom">
            <p>&copy; 2026 Hydro. All rights reserved.</p>
        </div>
    </footer>

    <script type="module" src="/src/main.js"></script>
    <script>
        const form = document.getElementById('contactForm');
        const result = document.getElementById('formResult');

        form.addEventListener('submit', function (e) {
            e.preventDefault();
            const formData = new FormData(form);
            const object = Object.fromEntries(formData);
            const json = JSON.stringify(object);
            const btn = form.querySelector('button');
            const originalText = btn.innerText;

            result.style.display = "block";
            result.innerHTML = "Sending...";
            result.style.color = "var(--text-secondary)";
            btn.disabled = true;

            fetch('https://api.web3forms.com/submit', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: json
            })
                .then(async (response) => {
                    let json = await response.json();
                    if (response.status == 200) {
                        result.innerHTML = "Message Sent! 🚀 Check your email soon.";
                        result.style.color = "var(--success)";
                        form.reset();
                    } else {
                        console.log(response);
                        result.innerHTML = json.message;
                        result.style.color = "var(--danger)";
                    }
                })
                .catch(error => {
                    console.log(error);
                    result.innerHTML = "Something went wrong! Please try again later.";
                    result.style.color = "var(--danger)";
                })
                .then(function () {
                    btn.disabled = false;
                    setTimeout(() => {
                        result.style.display = "none";
                    }, 5000);
                });
        });
    </script>
</body>

</html>
